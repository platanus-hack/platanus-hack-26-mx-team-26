<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; padding:22px; background:var(--bg); font-family:var(--font-body); }
  .grid { display:flex; flex-direction:column; gap:20px; }
  .row { display:flex; flex-wrap:wrap; align-items:center; gap:12px; }
  .lbl { font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-muted); font-weight:700; margin-bottom:10px; }
  .two { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, IconButton, Input, Select, Switch } = window.SirenaDesignSystem_c1cb8e;
    function Demo() {
      const [on, setOn] = React.useState(true);
      return (
        <div className="grid">
          <div>
            <div className="lbl">Buttons</div>
            <div className="row">
              <Button variant="primary" icon="play">Launch simulation</Button>
              <Button variant="secondary" icon="sparkles">Generate voice</Button>
              <Button variant="soft" iconRight="arrow-right">View report</Button>
              <Button variant="ghost">Cancel</Button>
              <Button variant="danger" icon="phone-call">Place calls</Button>
              <Button loading>Sending…</Button>
            </div>
          </div>
          <div>
            <div className="lbl">Sizes · icon buttons</div>
            <div className="row">
              <Button size="sm" variant="soft">Small</Button>
              <Button size="md" variant="soft">Medium</Button>
              <Button size="lg" variant="soft">Large</Button>
              <IconButton icon="bell" variant="outline" label="Bell" />
              <IconButton icon="play" variant="solid" label="Play" />
              <IconButton icon="more-horizontal" variant="ghost" label="More" />
            </div>
          </div>
          <div className="two">
            <Input label="Work email" icon="mail" placeholder="you@platanus.org" />
            <Select label="Channel" options={['Audio note','WhatsApp message','Phone call']} />
            <Input label="Org name" error="This name is taken." defaultValue="platanus" />
            <div style={{display:'flex',alignItems:'flex-end',paddingBottom:8}}>
              <Switch checked={on} onChange={setOn} label="Notify me as people respond" />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
    requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
  </script>
</body>
</html>
