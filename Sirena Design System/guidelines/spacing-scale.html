<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px grid · space-1 → space-10" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--bg); font-family: var(--font-mono); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--coral-500); border-radius: 4px; width: 100%; }
  .lbl { font-size: 10px; color: var(--text-muted); }
  .item { width: 44px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><span class="lbl">1·4</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><span class="lbl">2·8</span></div>
    <div class="item"><div class="bar" style="height:12px"></div><span class="lbl">3·12</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="lbl">4·16</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="lbl">6·24</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="lbl">7·32</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="lbl">9·48</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="lbl">10·64</span></div>
  </div>
</body>
</html>
