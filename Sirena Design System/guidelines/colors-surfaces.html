<!-- @dsCard group="Colors" viewport="700x180" name="Surfaces · light & dark" subtitle="Semantic surface aliases in both modes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--n-100); font-family: var(--font-body); display: flex; gap: 16px; }
  .mode { flex: 1; padding: 16px; border-radius: var(--radius-lg); background: var(--bg); }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); font-weight: 700; margin-bottom: 10px; }
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .s { border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 8px 12px; font-size: 12px; color: var(--text-body); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="mode" data-theme="light">
    <div class="tag">Light</div>
    <div class="stack">
      <div class="s" style="background:var(--bg)">--bg</div>
      <div class="s" style="background:var(--surface)">--surface</div>
      <div class="s" style="background:var(--surface-sunken)">--surface-sunken</div>
    </div>
  </div>
  <div class="mode" data-theme="dark">
    <div class="tag" style="color:var(--text-muted)">Dark</div>
    <div class="stack">
      <div class="s" style="background:var(--bg)">--bg</div>
      <div class="s" style="background:var(--surface)">--surface</div>
      <div class="s" style="background:var(--surface-raised)">--surface-raised</div>
    </div>
  </div>
</body>
</html>
