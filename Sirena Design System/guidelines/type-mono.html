<!-- @dsCard group="Type" viewport="700x150" name="Data · Space Mono" subtitle="Eyebrows, IDs, numbers, timestamps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--bg); font-family: var(--font-mono); color: var(--text-body); }
  .eyebrow { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); font-weight: 700; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px 18px; margin-top: 14px; font-size: 13px; }
  .k { color: var(--text-faint); font-size: 11px; }
  .v { color: var(--text-strong); font-weight: 700; font-size: 16px; }
  .up { color: var(--danger); } .down { color: var(--success); }
</style>
</head>
<body>
  <div class="eyebrow">VOICE LIBRARY · CONSENTED</div>
  <div class="grid">
    <div><div class="k">SIM ID</div><div class="v">SIR-4821</div></div>
    <div><div class="k">PHONE</div><div class="v">+56 9 8421 0093</div></div>
    <div><div class="k">CAPTURED</div><div class="v">2026-06-14</div></div>
    <div><div class="k">RISK</div><div class="v up">385 ↑</div></div>
    <div><div class="k">RESOLVED</div><div class="v down">12 ↓</div></div>
    <div><div class="k">SAMPLE</div><div class="v">0:32</div></div>
  </div>
</body>
</html>
