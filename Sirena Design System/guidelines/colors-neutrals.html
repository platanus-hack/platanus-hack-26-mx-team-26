<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Violet-cool slate ramp, 0 → 950" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); font-family: var(--font-mono); }
  .ramp { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 76px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-size: 10px; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="sw" style="background:var(--n-0);color:var(--n-600);box-shadow:inset 0 0 0 1px var(--n-100)">0</div>
    <div class="sw" style="background:var(--n-50);color:var(--n-600)">50</div>
    <div class="sw" style="background:var(--n-100);color:var(--n-600)">100</div>
    <div class="sw" style="background:var(--n-200);color:var(--n-700)">200</div>
    <div class="sw" style="background:var(--n-300);color:var(--n-800)">300</div>
    <div class="sw" style="background:var(--n-400);color:#fff">400</div>
    <div class="sw" style="background:var(--n-500);color:#fff">500</div>
    <div class="sw" style="background:var(--n-600);color:#fff">600</div>
    <div class="sw" style="background:var(--n-700);color:#fff">700</div>
    <div class="sw" style="background:var(--n-800);color:#fff">800</div>
    <div class="sw" style="background:var(--n-900);color:#fff">900</div>
    <div class="sw" style="background:var(--n-950);color:#fff">950</div>
  </div>
</body>
</html>
