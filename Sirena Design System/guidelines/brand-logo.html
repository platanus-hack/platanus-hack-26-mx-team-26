<!-- @dsCard group="Brand" viewport="700x200" name="Logo" subtitle="Mark + wordmark, light & dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--n-100); font-family: var(--font-body); display: flex; gap: 16px; }
  .panel { flex: 1; border-radius: var(--radius-lg); padding: 26px 24px; display: flex; align-items: center; gap: 18px; }
  .light { background: var(--n-0); }
  .dark { background: var(--n-950); }
  img.word { height: 40px; }
  img.mark { height: 52px; }
  .tag { position: absolute; }
</style>
</head>
<body>
  <div class="panel light">
    <img class="mark" src="../assets/logo-mark.svg" alt="Sirena mark">
    <img class="word" src="../assets/logo-wordmark.svg" alt="Sirena">
  </div>
  <div class="panel dark">
    <img class="mark" src="../assets/logo-mark.svg" alt="Sirena mark">
    <img class="word" src="../assets/logo-wordmark-dark.svg" alt="Sirena">
  </div>
</body>
</html>
