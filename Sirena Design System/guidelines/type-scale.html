<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="2xs → 5xl ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bg); font-family: var(--font-display); color: var(--text-strong); }
  .line { display: flex; align-items: baseline; gap: 14px; padding: 3px 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 88px; flex: none; }
  .spec { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="line"><span class="tok">5xl · 52</span><span class="spec" style="font-size:var(--text-5xl);letter-spacing:-.02em">Sirena</span></div>
  <div class="line"><span class="tok">3xl · 31</span><span class="spec" style="font-size:var(--text-3xl);letter-spacing:-.02em">Launch room</span></div>
  <div class="line"><span class="tok">2xl · 25</span><span class="spec" style="font-size:var(--text-2xl)">Voice library</span></div>
  <div class="line"><span class="tok">xl · 20</span><span class="spec" style="font-size:var(--text-xl)">Campaign overview</span></div>
  <div class="line"><span class="tok">lg · 17</span><span class="spec" style="font-size:var(--text-lg);font-family:var(--font-body);font-weight:600">Section heading</span></div>
  <div class="line"><span class="tok">md · 15</span><span class="spec" style="font-size:var(--text-md);font-family:var(--font-body)">Body copy default</span></div>
  <div class="line"><span class="tok">sm · 13</span><span class="spec" style="font-size:var(--text-sm);font-family:var(--font-body);color:var(--text-body)">Dashboard labels</span></div>
  <div class="line"><span class="tok">xs · 12</span><span class="spec" style="font-size:var(--text-xs);font-family:var(--font-mono);color:var(--text-muted)">META / CAPTIONS</span></div>
</body>
</html>
